apiVersion: apps/v1
kind: Deployment
metadata:
  name: basic-actix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basic-actix
  template:
    metadata:
      labels:
        app: basic-actix
    spec:
      containers:
        - name: basic-actix
          image: basic-actix:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_PORT
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
